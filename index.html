    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.soon { opacity: 0.35; cursor: default; }
    .search-wrap { max-width: 860px; margin: 2rem auto 0; padding: 0 2rem; }

    .search-icon { position: absolute; left: 1rem; color: var(--muted); font-size: 1rem; pointer-events: none; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem 0.85rem 2.8rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 300; outline: none; transition: border-color 0.2s; }

    .results-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 1rem; letter-spacing: 0.03em; }
    .cards { display: grid; gap: 0.75rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.4rem; transition: border-color 0.2s; }
    .card:hover { border-color: #2a2a2a; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 1rem; color: var(--text); letter-spacing: -0.01em; }
    .badges { display: flex; gap: 0.35rem; flex-shrink: 0; margin-top: 0.1rem; }
    .badge { padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-hl { background: rgba(200,184,154,0.12); color: var(--hl); border: 1px solid rgba(200,184,154,0.25); }
    .badge-sl { background: rgba(122,156,184,0.12); color: var(--sl); border: 1px solid rgba(122,156,184,0.25); }
    .card-def { font-size: 0.875rem; color: #aaaaaa; line-height: 1.6; font-weight: 300; }
    .empty { text-align: center; padding: 4rem 0; color: var(--muted); font-size: 0.9rem; }
    .coming-soon { text-align: center; padding: 5rem 0; color: var(--muted); }
    .coming-soon h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: #333; margin-bottom: 0.5rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>

  { title: "Negative externality", hl: true, sl: true, def: "A cost imposed on third parties not involved in a transaction. The social cost exceeds the private cost." },

  { title: "Nominal GDP", hl: true, sl: true, def: "The total value of goods and services produced in an economy measured at current prices, unadjusted for inflation." },
  { title: "Non-price competition", hl: true, sl: true, def: "Competition between firms using methods other than price, such as advertising, product differentiation, or brand loyalty." },
  { title: "Normal good", hl: true, sl: true, def: "A good for which demand increases as consumer income rises (positive income elasticity of demand)." },
  { title: "Normal profit", hl: true, sl: true, def: "The minimum level of profit required to keep a firm in the industry in the long run. It occurs when total revenue equals total cost including opportunity cost." },
  { title: "Official development assistance (ODA)", hl: true, sl: true, def: "Aid from governments to developing countries provided at concessional terms to promote economic development and welfare." },
  { title: "Oligopoly", hl: true, sl: true, def: "A market structure dominated by a small number of large firms that are interdependent and may collude or compete." },
  { title: "Opportunity cost", hl: true, sl: true, def: "The value of the next best alternative forgone when a choice is made." },
  { title: "Output approach", hl: true, sl: true, def: "A method of calculating GDP by summing the value added by all industries in the economy." },
  { title: "Overvalued currency", hl: true, sl: true, def: "When a currency's exchange rate is set above its equilibrium value, making exports more expensive and imports cheaper." },
  { title: "Perfect competition", hl: true, sl: true, def: "A market structure characterised by many buyers and sellers, homogeneous products, freedom of entry and exit, and perfect information." },
  { title: "Phillips curve", hl: true, sl: true, def: "A relationship showing the short-run trade-off between inflation and unemployment: as unemployment falls, inflation tends to rise." },
  { title: "Positive externality", hl: true, sl: true, def: "A benefit received by third parties not involved in a transaction. The social benefit exceeds the private benefit." },
  { title: "Potential output", hl: true, sl: true, def: "The maximum level of real output an economy can produce when all resources are fully and efficiently employed." },
  { title: "Price ceiling", hl: true, sl: true, def: "A maximum price set by the government below the equilibrium price, leading to excess demand (shortage)." },
  { title: "Price discrimination", hl: true, sl: true, def: "When a firm charges different prices to different consumers for the same product, based on their willingness to pay." },
  { title: "Price elasticity of demand (PED)", hl: true, sl: true, def: "A measure of the responsiveness of quantity demanded to a change in price. PED = % change in Qd / % change in price." },
  { title: "Price elasticity of supply (PES)", hl: true, sl: true, def: "A measure of the responsiveness of quantity supplied to a change in price. PES = % change in Qs / % change in price." },
  { title: "Price floor", hl: true, sl: true, def: "A minimum price set by the government above the equilibrium price, leading to excess supply (surplus)." },
  { title: "Price leadership", hl: true, sl: false, def: "A form of tacit collusion in an oligopoly where one dominant firm sets the price and others follow." },
  { title: "Price maker", hl: true, sl: true, def: "A firm with sufficient market power to set its own price, rather than being forced to accept the market price." },
  { title: "Price taker", hl: true, sl: true, def: "A firm that must accept the market price as determined by supply and demand. In perfect competition, all firms are price takers." },
  { title: "Privatisation", hl: true, sl: true, def: "The transfer of ownership of a business, industry or service from the public sector to the private sector." },
  { title: "Producer surplus", hl: true, sl: true, def: "The difference between the price producers receive and the minimum price they would accept. It is the area above the supply curve and below the market price." },
  { title: "Production possibility curve (PPC)", hl: true, sl: true, def: "A graph showing the maximum combinations of two goods that can be produced in an economy given its resources and technology." },
  { title: "Progressive tax", hl: true, sl: true, def: "A tax where the rate increases as taxable income increases, taking a higher percentage from higher earners." },
  { title: "Protectionism", hl: true, sl: true, def: "Government policies that restrict international trade to protect domestic industries from foreign competition." },
  { title: "Public good", hl: true, sl: true, def: "A good that is non-excludable and non-rival in consumption, such as national defence or street lighting." },
  { title: "Quantitative easing (QE)", hl: true, sl: false, def: "An unconventional monetary policy where the central bank creates new money to purchase financial assets, increasing the money supply to stimulate the economy." },
  { title: "Quota", hl: true, sl: true, def: "A limit on the quantity of a good that can be imported into a country." },
  { title: "Real GDP", hl: true, sl: true, def: "GDP adjusted for inflation, allowing comparisons of output over time at constant prices." },
  { title: "Real GDP per capita", hl: true, sl: true, def: "Real GDP divided by the total population, used as a measure of average living standards." },
  { title: "Recession", hl: true, sl: true, def: "A period of negative economic growth, typically defined as two consecutive quarters of falling real GDP." },
  { title: "Recessionary gap", hl: true, sl: true, def: "A situation where actual output is below the potential output of the economy, resulting in unemployment." },
  { title: "Redistribution of income", hl: true, sl: true, def: "Policies that transfer income from wealthier to poorer individuals, such as progressive taxation and welfare payments." },
  { title: "Regressive tax", hl: true, sl: true, def: "A tax where the burden falls more heavily on lower-income individuals as a proportion of their income." },
  { title: "Relative poverty", hl: true, sl: true, def: "A measure of poverty relative to living standards in wider society, typically defined as income below a certain percentage of median income." },
  { title: "Remittances", hl: true, sl: true, def: "Money sent by migrant workers back to their home countries." },
  { title: "Revenue", hl: true, sl: true, def: "Total income received by a firm from the sale of its output (TR = P \u00d7 Q)." },
  { title: "Short-run aggregate supply (SRAS)", hl: true, sl: true, def: "The total output that firms in an economy are willing and able to produce at each price level in the short run." },
  { title: "Soft peg", hl: true, sl: false, def: "A form of managed exchange rate where a currency is fixed to another within a band, with some flexibility for adjustment." },
  { title: "Stagflation", hl: true, sl: true, def: "A situation where high inflation and high unemployment occur simultaneously, often with slow economic growth." },
  { title: "Structural adjustment programmes (SAPs)", hl: true, sl: false, def: "Economic reform packages required by the IMF and World Bank in exchange for loans to developing countries, typically involving free market reforms." },
  { title: "Structural unemployment", hl: true, sl: true, def: "Unemployment caused by a mismatch between the skills of workers and the skills required by employers, often resulting from technological change." },
  { title: "Subsidy", hl: true, sl: true, def: "A payment by the government to producers to lower their costs of production and encourage greater output." },
  { title: "Substitute goods", hl: true, sl: true, def: "Goods that can be used in place of each other. An increase in the price of one leads to an increase in demand for the substitute." },
  { title: "Supply-side policies", hl: true, sl: true, def: "Government policies that aim to increase the productive capacity of the economy by improving the efficiency or quantity of factors of production." },
  { title: "Sustainable development", hl: true, sl: true, def: "Development that meets the needs of the present without compromising the ability of future generations to meet their own needs." },
  { title: "Tariff", hl: true, sl: true, def: "A tax on imported goods, intended to raise their price and protect domestic producers from foreign competition." },
  { title: "Terms of trade", hl: true, sl: true, def: "The ratio of a country's export prices to its import prices. ToT = (Index of export prices / Index of import prices) \u00d7 100." },
  { title: "Total cost", hl: true, sl: true, def: "The sum of all fixed and variable costs at a given level of output (TC = TFC + TVC)." },
  { title: "Total revenue", hl: true, sl: true, def: "The total income received by a firm from selling its output (TR = P \u00d7 Q)." },
  { title: "Trade creation", hl: true, sl: true, def: "A benefit of joining a customs union where trade shifts from a high-cost domestic producer to a lower-cost member country producer." },
  { title: "Trade diversion", hl: true, sl: true, def: "A cost of joining a customs union where trade shifts away from a low-cost non-member to a higher-cost member due to the common external tariff." },
  { title: "Trade liberalisation", hl: true, sl: true, def: "The reduction or elimination of trade barriers to encourage free trade between countries." },
  { title: "Transfer payments", hl: true, sl: true, def: "Payments made by the government to individuals for which no good or service is provided in return, such as welfare benefits or pensions." },
  { title: "Undervalued currency", hl: true, sl: true, def: "When a currency's exchange rate is set below its equilibrium value, making exports cheaper and imports more expensive." },
  { title: "Unemployment", hl: true, sl: true, def: "A situation where individuals who are actively seeking work at the prevailing wage rate are unable to find employment." },
  { title: "Unemployment rate", hl: true, sl: true, def: "The percentage of the labour force that is unemployed and actively seeking work." },
  { title: "Value added", hl: true, sl: true, def: "The difference between the value of a firm's output and the cost of its intermediate inputs." },
  { title: "Variable costs", hl: true, sl: true, def: "Costs that change with the level of output, such as raw materials and direct labour." },
  { title: "Welfare payments", hl: true, sl: true, def: "Government transfer payments to individuals to support their standard of living, such as unemployment benefits or housing support." },
  { title: "World Trade Organization (WTO)", hl: true, sl: true, def: "An international organisation that sets and enforces rules for international trade, aiming to reduce trade barriers and resolve disputes." },
  { title: "X-inefficiency", hl: true, sl: false, def: "When a firm fails to minimise costs due to a lack of competitive pressure, resulting in productive inefficiency." }
];

  { title: "Facultative anaerobes", def: "Versatile organisms that can adapt to both oxygen-rich and oxygen-free environments." },
  { title: "Feedback Inhibition", def: "A process where the end product of a metabolic pathway inhibits an enzyme involved in its own synthesis." },
  { title: "Fertilizers", def: "Natural or artificial substances containing chemical elements that improve the growth and productivity of plants." },
  { title: "Fibrinogen", def: "A soluble plasma protein that is converted into fibrin during the clotting process." },
  { title: "Fitness", def: "How well an organism is adapted to its environment, influencing its ability to survive and reproduce." },
  { title: "Follicle-Stimulating Hormone (FSH)", def: "A hormone that stimulates the growth of ovarian follicles and oestradiol production." },
  { title: "Food chain", def: "A linear sequence of organisms, each feeding on the previous one, illustrating the flow of energy and nutrients." },
  { title: "Food web", def: "A complex network of interconnected food chains, representing all the feeding relationships within a community." },
  { title: "Fundamental niche", def: "The full range of environmental conditions and resources a species could theoretically occupy without competition or predation." },
  { title: "G protein-coupled receptors", def: "A large family of transmembrane receptors that detect external signals and activate intracellular G proteins, initiating cellular responses." },
  { title: "Gamete fusion", def: "Also known as fertilization, the combination of two haploid gametes to form a diploid zygote." },
  { title: "Gametogenesis", def: "The process by which cells undergo meiosis to form gametes." },
  { title: "Gas exchange", def: "The process by which oxygen enters the body and carbon dioxide is expelled." },
  { title: "Gel electrophoresis", def: "A laboratory technique used to separate and analyze molecules such as DNA, RNA, or proteins based on their size, charge, or shape." },
  { title: "Gene", def: "A segment of DNA containing the instructions for producing a specific protein or RNA molecule, determining the traits and functions of an organism." },
  { title: "Gene expression", def: "The process of using genetic information to produce functional products like proteins." },
  { title: "Gene flow", def: "The movement of genes from one population to another." },
  { title: "Gene knockout", def: "A genetic technique where a specific gene is intentionally inactivated to study its function." },
  { title: "Gene mutation", def: "A permanent change in the nucleotide sequence of DNA, affecting the structure and function of proteins." },
  { title: "Gene pool", def: "The total collection of all alleles present in a population." },
  { title: "Genetic code", def: "A system that translates DNA instructions into proteins, the essential building blocks of life." },
  { title: "Genome", def: "The complete set of genetic instructions that determines the structure, function, and traits of an organism." },
  { title: "Genomic imprinting", def: "A form of epigenetic inheritance where gene expression depends on whether it is inherited from the mother or the father." },
  { title: "Genotype", def: "The genetic makeup of an organism, specifically the combination of alleles it inherits for a particular trait." },
  { title: "Germination", def: "The process by which a seed transitions from dormancy to active growth, developing into a seedling." },
  { title: "Globular protein", def: "Compact, spherical proteins that are typically soluble in water, formed by tight folding of the polypeptide chain." },
  { title: "Glycolysis", def: "The metabolic pathway that breaks down one molecule of glucose (6C) into two molecules of pyruvate (3C), producing a net gain of 2 ATP and 2 NADH, without oxygen." },
  { title: "Glycoprotein", def: "A protein with carbohydrate chains attached, involved in cell recognition, signalling, and adhesion." },
  { title: "Golgi apparatus", def: "A stack of flattened, membrane-bound sacs that process, package, and distribute proteins and lipids." },
  { title: "Gonadotropin-Releasing Hormone (GnRH)", def: "A peptide hormone secreted by the hypothalamus that stimulates the anterior pituitary to release LH and FSH." },
  { title: "Great Oxidation Event", def: "A dramatic increase in atmospheric oxygen that transformed Earth environment and paved the way for more complex life." },
  { title: "Greenhouse gas", def: "A gas that contributes to the greenhouse effect by absorbing infrared radiation, such as CO2 and methane." },
  { title: "Habitat", def: "The specific place where an organism, population, species, or community lives." },
  { title: "Haemophilia", def: "A disorder where blood fails to clot properly due to a deficiency in a clotting factor." },
  { title: "Helicase", def: "An enzyme that separates the two strands of the DNA double helix during replication." },
  { title: "Helper T-lymphocytes", def: "A type of T cell that helps activate B cells by providing necessary signals once both cells have recognized the same antigen." },
  { title: "Heritability", def: "The ability of a trait to be passed from parents to offspring through genetic information." },
  { title: "Heterotroph", def: "Organisms that obtain energy and carbon by consuming other organisms or organic matter." },
  { title: "Histone", def: "A protein that provides structural support for DNA in eukaryotic cells, helping to compact it into chromatin." },
  { title: "HIV", def: "A virus that attacks the immune system, leading to the eventual development of AIDS if untreated." },
  { title: "Holozoic nutrition", def: "The process by which animals obtain energy and nutrients by consuming other organisms or organic matter." },
  { title: "Homeostasis", def: "The maintenance of a stable internal environment within an organism, ensuring optimal conditions for cellular processes." },
  { title: "Homologous structures", def: "Anatomical features that share a similar structure and position across different species but serve different functions." },
  { title: "Horizontal Gene Transfer", def: "The direct exchange of genetic material between unrelated organisms, especially common in prokaryotes." },
  { title: "Hormone", def: "Chemical messengers secreted by endocrine glands into the bloodstream that regulate various physiological processes." },
  { title: "Human chorionic gonadotropin (hCG)", def: "A hormone essential for sustaining early pregnancy that maintains progesterone production to keep the uterine environment suitable." },
  { title: "Hydrolysis", def: "A chemical reaction where water breaks down a compound." },
  { title: "Hypertonic", def: "A solution with a higher solute concentration compared to another solution." },
  { title: "Hypothalamus", def: "A region of the brain responsible for regulating many physiological processes, including the endocrine system, and sending signals to the pituitary gland." },
  { title: "Hypotonic", def: "A solution with a lower solute concentration compared to another solution." },
  { title: "Immunity", def: "The ability of the body to defend against infections by recognizing and eliminating pathogens." },
  { title: "In vitro fertilization (IVF)", def: "A medical procedure that allows fertilization to occur outside the body." },
  { title: "Independent assortment", def: "How alleles of different genes are distributed into gametes independently of one another." },
  { title: "Ingestion", def: "The first step in holozoic nutrition, where animals take food into their bodies." },
  { title: "Innate immune system", def: "A general, non-specific immune response that does not change throughout life and responds quickly to pathogens." },
  { title: "Interspecific competition", def: "Occurs when two or more species compete for the same limited resources, such as food, space, or light." },
  { title: "Intracellular enzymes", def: "Enzymes that operate within cells, driving critical metabolic pathways such as glycolysis and the Krebs cycle." },
  { title: "Ionic bonds", def: "Bonds that form between R-groups that carry opposite charges in a protein." },
  { title: "Isotonic", def: "Two solutions with equal solute concentrations, resulting in no net movement of water." },
  { title: "Karyotype", def: "The complete set of an organism chromosomes, described by number, size, shape, and banding pattern." },
  { title: "Krebs cycle", def: "Also known as the citric acid cycle, occurs in the mitochondrial matrix and is a key part of aerobic respiration." },
  { title: "Leaching", def: "The loss of water-soluble plant nutrients from the soil due to rain and irrigation." },
  { title: "Ligaments", def: "Strong, fibrous bands of connective tissue linking bone to bone." },
  { title: "Ligand", def: "A molecule that binds to a specific site on a receptor protein." },
  { title: "Ligase", def: "An enzyme that joins Okazaki fragments on the lagging strand during DNA replication." },
  { title: "Lignin", def: "A complex, strong polymer deposited in the walls of xylem vessels." },
  { title: "Limiting factor", def: "Any abiotic or biotic variable that restricts a species growth, reproduction, or distribution if it goes beyond the species tolerance range." },
  { title: "Locus", def: "A gene exact location on a chromosome, acting as an address for finding and studying genes." },
  { title: "Loop of Henle", def: "A U-shaped tube in the nephron responsible for creating a concentration gradient in the medulla, enabling the production of concentrated urine." },
  { title: "LUCA", def: "The last universal common ancestor of all present-day organisms, representing the root of the tree of life." },
  { title: "Luteinizing Hormone (LH)", def: "A hormone that triggers ovulation and supports the formation of the corpus luteum." },
  { title: "Lymphatic system", def: "A network of vessels, tissues, and organs that drain excess tissue fluid and return it to the blood, while aiding immune function." },
  { title: "Lymphocyte", def: "A type of white blood cell critical for the adaptive immune response." },
  { title: "Lysosome", def: "Specialized vesicles containing digestive enzymes that break down waste materials and cellular debris." },
  { title: "Medulla Oblongata", def: "Part of the brainstem responsible for regulating involuntary functions, including heart rate, blood pressure, and respiration." },
  { title: "Meiosis", def: "A type of cell division that reduces the chromosome number by half, producing four genetically distinct haploid cells, essential for sexual reproduction." },
  { title: "Melatonin", def: "A hormone secreted by the pineal gland that regulates sleep-wake cycles." },
  { title: "Membrane potential", def: "The difference in electrical charge between the inside and outside of a cell." },
  { title: "Metabolism", def: "The sum of all chemical reactions occurring in an organism to maintain life, including catabolism (breakdown) and anabolism (building)." },
  { title: "Microplastics", def: "Plastic fragments smaller than 5 mm in size." },
  { title: "Mitochondria", def: "Double-membrane-bound organelles responsible for producing ATP through aerobic respiration." },
  { title: "Mitosis", def: "A type of cell division in which a single parent cell divides to produce two genetically identical daughter cells." },
  { title: "Mitotic index", def: "The ratio of the number of cells in mitosis to the total number of cells observed." },
  { title: "Mixotroph", def: "Organisms that can obtain energy and carbon through both autotrophic and heterotrophic modes of nutrition." },
  { title: "Molecular Clock", def: "The use of the gradual accumulation of mutations to infer when species diverged from a common ancestor." },
  { title: "Monoclonal antibodies", def: "Lab-engineered antibodies designed to bind to a specific target." },
  { title: "Motor neurons", def: "Cells that carry instructions from the brain to the muscles." },
  { title: "Multicellularity", def: "Organisms composed of multiple cells functioning together as a single unit." },
  { title: "Mutation", def: "A change in the DNA sequence that can alter the instructions for building proteins or regulating cellular processes." },
  { title: "Mutualism", def: "A cooperative relationship where both species gain benefits." },
  { title: "Myelin", def: "A fatty substance that wraps around the axons of neurons, forming an insulating layer that speeds up signal transmission." },
  { title: "Natural selection", def: "The process where individuals with traits better suited to their environment have higher reproductive success, passing these traits to the next generation." },
  { title: "Negative feedback loop", def: "A self-regulating system that detects changes in a variable and triggers responses to bring it back to a set point." },
  { title: "Neurotransmitter", def: "Chemical signals used by neurons to communicate across synapses." },
  { title: "Non-Disjunction", def: "The failure of homologous chromosomes or sister chromatids to separate properly during meiosis." },
  { title: "Nucleosome", def: "The basic structural unit of chromatin, consisting of DNA wrapped around a core of histone proteins." },
  { title: "Nucleus", def: "A double-membrane-bound organelle containing the cell DNA." },
  { title: "Obligate aerobes", def: "Organisms that depend on oxygen for aerobic respiration to efficiently generate ATP." },
  { title: "Obligate Anaerobes", def: "Organisms that find oxygen toxic and thrive in oxygen-free environments." },
  { title: "Oestradiol", def: "A form of estrogen that promotes the growth of the uterine lining and regulates FSH and LH via feedback loops." },
  { title: "Open system", def: "A system that exchanges both energy and matter with its surroundings." },
  { title: "Organelles", def: "Structures inside cells that perform specific jobs to keep the cell alive." },
  { title: "Osmoregulation", def: "The process of maintaining the balance of water and solutes in the body." },
  { title: "Osmosis", def: "The passive movement of water molecules across a semi-permeable membrane from a region of lower solute concentration to higher solute concentration." },
  { title: "Pacemaker", def: "A group of cells in the right atrium that regulates the heartbeat by initiating electrical impulses." },
  { title: "Parasitism", def: "A relationship where one species (the parasite) benefits at the expense of another (the host)." },
  { title: "Parthenogenesis", def: "A form of asexual reproduction where an egg develops into an individual without fertilization." },
  { title: "Pathogen", def: "Any organism or agent capable of causing disease." },
  { title: "PCR (Polymerase Chain Reaction)", def: "A technique that amplifies DNA, creating millions of copies of a specific DNA sequence in just a few hours." },
  { title: "Pedigree charts", def: "Family tree diagrams that track the inheritance of traits across generations." },
  { title: "Peptide bond", def: "A covalent bond formed between the carboxyl group of one amino acid and the amino group of another." },
  { title: "Peristalsis", def: "A wave-like contraction of smooth muscles that pushes food through the digestive tract." },
  { title: "Permafrost", def: "Ground that remains frozen for two or more consecutive years, typically found in polar regions." },
  { title: "Phagocytosis", def: "The process by which phagocytes engulf and digest pathogens." },
  { title: "Phenotype", def: "The observable traits or characteristics of an organism, resulting from the interaction between its genotype and the environment." },
  { title: "Phenotypic plasticity", def: "The ability of an organism to alter its phenotype in response to environmental changes." },
  { title: "Phosphorylation", def: "The addition of a phosphate group to a molecule." },
  { title: "Photolysis", def: "The process of using light energy to split water molecules into oxygen, protons, and electrons." },
  { title: "Photosynthesis", def: "The process by which plants, algae, and some bacteria convert light energy from the sun into chemical energy stored as organic compounds like glucose." },
  { title: "Photosynthetic pigments", def: "Specialized molecules that absorb light energy and convert it into chemical energy during photosynthesis." },
  { title: "Photosystem", def: "A pigment-protein complex that absorbs light energy and transfers it to a reaction center, exciting electrons for photosynthesis." },
  { title: "Phototropism", def: "The growth response of a plant towards or away from light." },
  { title: "Phytohormones", def: "Signalling chemicals that regulate growth, development, and responses to environmental stimuli in plants." },
  { title: "Pituitary Gland", def: "A small gland at the base of the brain that secretes hormones controlling other endocrine glands." },
  { title: "Placenta", def: "A temporary organ that forms during pregnancy, connecting the foetus to the uterine wall and acting as a bridge for substance exchange between mother and baby." },
  { title: "Plasma membrane", def: "The thin, flexible boundary surrounding a cell, composed of a phospholipid bilayer with embedded proteins, cholesterol, and carbohydrates." },
  { title: "Plasmodesmata", def: "Microscopic channels that connect plant cells, allowing substances to move between them." },
  { title: "Plasmolysis", def: "The process where the cell membrane pulls away from the cell wall due to water loss." },
  { title: "Pluripotent stem cells", def: "Stem cells that can differentiate into any cell type of the embryo (all three germ layers) but cannot form extra-embryonic tissues." },
  { title: "Pneumocytes", def: "Specialized cells that line the alveoli in the lungs, responsible for exchanging oxygen and carbon dioxide." },
  { title: "Pollination", def: "The transfer of pollen from the anther to the stigma, a critical step preceding fertilization." },
  { title: "Polyploidy", def: "The duplication of an organism entire chromosome set." },
  { title: "Population", def: "A group of individuals of the same species living in a specific area, forming the building blocks of ecosystems." },
  { title: "Positive feedback loop", def: "A process where an initial change causes further changes that amplify the original effect, making it stronger and self-reinforcing." },
  { title: "Primary production", def: "The synthesis of organic carbon compounds from CO2 by autotrophs using external energy sources like sunlight." },
  { title: "Primary structure", def: "The linear sequence of amino acids in a protein polypeptide chain." },
  { title: "Primary succession", def: "The process by which life gradually colonizes and transforms a previously uninhabitable area." },
  { title: "Primase", def: "An enzyme that synthesizes a short RNA primer to provide a starting point for DNA polymerase during replication." },
  { title: "Progesterone", def: "A hormone that maintains the endometrium, preparing it for implantation, and inhibits FSH and LH to prevent new follicle development." },
  { title: "Prokaryote", def: "A single-celled organism lacking a nucleus and membrane-bound organelles, with genetic material in a single circular DNA molecule." },
  { title: "Promoter", def: "A specific DNA sequence near the start of a gene that acts as a binding site for RNA polymerase to initiate transcription." },
  { title: "Proteome", def: "The complete set of proteins produced by a cell, tissue, or organism at a specific time." },
  { title: "Realized niche", def: "The true extent of a species presence and activity in an ecosystem, limited by biotic factors like competition." },
  { title: "Receptor", def: "A protein that detects and responds to specific signals by binding to signalling molecules (ligands) to initiate a cellular response." },
  { title: "Reflex Arc", def: "A neural pathway that allows a rapid, automatic response to a stimulus without brain involvement." },
  { title: "Reproductive isolation", def: "Occurs when populations are prevented from interbreeding, creating separate gene pools and enabling independent evolution." },
  { title: "Rewilding", def: "The process of restoring ecosystems to their natural state by reducing human interference and reintroducing key species." },
  { title: "Ribozyme", def: "An RNA molecule capable of catalyzing specific biochemical reactions, similar to how protein enzymes function." },
  { title: "RNA (Ribonucleic Acid)", def: "A single-stranded nucleic acid that plays a key role in coding, decoding, regulation, and expression of genetic information." },
  { title: "RNA World Hypothesis", def: "A scientific theory suggesting that RNA served as both genetic material and catalyst before the evolution of DNA and proteins." },
  { title: "Root pressure", def: "A positive hydrostatic pressure in the roots that helps push water up the xylem when transpiration is low." },
  { title: "Rubisco", def: "An enzyme that catalyzes the fixation of carbon dioxide into organic molecules during photosynthesis." },
  { title: "Saltatory Conduction", def: "The process by which an action potential jumps from one node of Ranvier to the next, rather than traveling continuously along the axon." },
  { title: "Saprotrophic nutrition", def: "A mode of heterotrophic nutrition where organisms derive energy and nutrients by feeding on dead or decaying organic material." },
  { title: "Sarcomere", def: "The basic contractile unit of muscle fiber." },
  { title: "Secondary Immune response", def: "A faster and stronger immune response upon re-exposure to the same pathogen, mediated by memory cells." },
  { title: "Secondary production", def: "The accumulation of carbon compounds in biomass by animals and other heterotrophs." },
  { title: "Secondary structure of a protein", def: "Regular, repeating patterns that form when a polypeptide chain folds, such as alpha helices and beta sheets." },
  { title: "Seed dispersal", def: "The process by which seeds are transported away from the parent plant to new locations." },
  { title: "Segregation", def: "The process where the two alleles of a gene separate during gamete formation, ensuring each gamete receives only one allele." },
  { title: "Selective breeding", def: "The process by which humans intentionally breed animals or plants to enhance specific traits." },
  { title: "Semi-conservative replication", def: "When each new DNA molecule consists of one original (parental) strand and one newly synthesized strand." },
  { title: "Sensory neuron", def: "Specialized cells that transmit information from the environment to the central nervous system (CNS)." },
  { title: "Sexual reproduction", def: "Involves the fusion of male and female gametes, resulting in offspring with a unique combination of genes." },
  { title: "Sieve tube elements", def: "Specialized plant cells adapted for the translocation of sugars, characterized by sieve plates and dependence on companion cells." },
  { title: "Signal transduction", def: "The process by which cells respond to external signals, converting them into a cascade of chemical responses inside the cell." },
  { title: "Simple diffusion", def: "The passive movement of molecules from an area of higher concentration to lower concentration, without requiring energy." },
  { title: "Speciation", def: "The evolutionary process through which one species splits into two or more distinct species." },
  { title: "Species", def: "A group of organisms that share similar traits, interbreed, and are reproductively isolated." },
  { title: "Stabilizing selection", def: "Natural selection that favors intermediate phenotypes, reducing variation." },
  { title: "Stem cells", def: "Undifferentiated cells with the unique ability to divide endlessly and differentiate into various specialized cell types." },
  { title: "Stomata", def: "Small openings on the leaf surface that regulate gas exchange and water loss in plants." },
  { title: "Summation", def: "The process by which multiple signals from presynaptic neurons are combined at the postsynaptic neuron to determine if it will fire an action potential." },
  { title: "Surfactant", def: "A lipid-based substance that reduces surface tension in the alveoli, preventing them from collapsing after exhalation." },
  { title: "Sympatric speciation", def: "Speciation that occurs when populations in the same geographical area become reproductively isolated." },
  { title: "Synapse", def: "The point where two neurons meet or where a neuron meets an effector cell, where chemical signals are transmitted." },
  { title: "Systolic blood pressure", def: "The maximum pressure exerted on artery walls when the ventricles contract and blood is pushed into the arteries." },
  { title: "Tendons", def: "Fibrous connective tissue that attaches muscle to bone." },
  { title: "Tertiary structure", def: "The complete three-dimensional folding of a single polypeptide chain." },
  { title: "Hardy-Weinberg principle", def: "A mathematical model that predicts how allele and genotype frequencies remain constant in a population unless evolutionary forces act upon it." },
  { title: "Thermoregulation", def: "The process by which organisms maintain their core body temperature within a narrow range." },
  { title: "Threshold Potential", def: "The critical membrane potential that must be reached for an action potential to be initiated." },
  { title: "Thrombin", def: "An enzyme that converts fibrinogen to fibrin in the clotting process." },
  { title: "Tipping Point", def: "The critical threshold where a small change in conditions causes a dramatic shift in an ecosystem." },
  { title: "Totipotent Stem Cells", def: "The most potent stem cells, able to differentiate into any cell type including extra-embryonic tissues, and capable of forming an entire organism." },
  { title: "Transcription", def: "The process by which the genetic information encoded in a DNA sequence is copied into a complementary RNA sequence." },
  { title: "Transcription factors", def: "Proteins that control transcription by binding to specific DNA sequences." },
  { title: "Transcriptome", def: "The complete set of RNA molecules transcribed from the genome in a cell at a specific time." },
  { title: "Translation", def: "The synthesis of polypeptides from mRNA, where the base sequence of mRNA is converted into an amino acid sequence." },
  { title: "Transpiration", def: "The loss of water vapor from the aerial parts of a plant, primarily through stomata." },
  { title: "Trophic level", def: "A group of organisms that share the same position in a food chain, based on how they obtain energy." },
  { title: "Turgid", def: "A plant cell that is swollen with water, causing the cell membrane to press tightly against the cell wall." },
  { title: "Turgor Pressure", def: "The pressure exerted by the cell contents against the cell wall." },
  { title: "Vaccine", def: "Biological preparations containing antigens or nucleic acids from a pathogen to stimulate immunity." },
  { title: "Variation", def: "Differences in traits among individuals within a population, encompassing physical characteristics, behaviors, and genetic sequences." },
  { title: "Ventilation", def: "The process of moving air or water across the gas-exchange surface to refresh the supply of gases and maintain the concentration gradient." },
  { title: "Vesicles", def: "Small, membrane-bound sacs composed of a phospholipid bilayer that carry various substances within or between cells." },
  { title: "Vestigial structure", def: "A reduced anatomical feature that has lost its original function but is retained as an evolutionary remnant." },
  { title: "Virus", def: "A non-cellular particle composed of genetic material (DNA or RNA) enclosed in a protein coat called a capsid." },
  { title: "Water potential", def: "A measure of the potential energy of water per unit volume, determining the direction water will move." },
  { title: "Whole Genome Sequencing (WGS)", def: "A DNA sequencing technique that determines the order of all or most of an organism DNA bases." },
  { title: "Xylem", def: "Long, tube-like structures formed from dead plant cells that function as conduits for water and dissolved minerals from roots to leaves." },
  { title: "Zoonoses", def: "Infectious diseases that are naturally transmitted between animals and humans." },
  { title: "Zygote", def: "A eukaryotic cell formed by the fusion of two gametes." }
];

const econSuggestions = ["Phillips Curve","Externalities","PED","Monopoly","Inflation","Subsidy","Nash Equilibrium","Lorenz Curve","Gini Coefficient"];
const bioSuggestions = ["Photosynthesis","Mitosis","DNA Replication","Natural selection","Osmosis","ATP","Homeostasis","Evolution","Meiosis"];

function renderChips(suggestions, containerId, searchId) {
  const c = document.getElementById(containerId);
  c.innerHTML = suggestions.map(s =>
    `<button class="chip" onclick="document.getElementById('${searchId}').value='${s}';doSearch('${searchId}','${containerId.replace('Chips','Cards')}','${containerId.replace('Chips','Meta')}',${containerId.startsWith('econ') ? 'econTerms' : 'bioTerms'},true)">${s}</button>`
  ).join('');
}

function doSearch(inputId, cardsId, metaId, terms, isBio) {
  const q = document.getElementById(inputId).value.trim();
  const cards = document.getElementById(cardsId);
  const meta = document.getElementById(metaId);
  if (!q) { cards.innerHTML = ''; meta.textContent = ''; return; }
  const lower = q.toLowerCase();
  const results = terms.filter(t => t.title.toLowerCase().includes(lower) || t.def.toLowerCase().includes(lower));
  meta.textContent = `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`;
  if (!results.length) { cards.innerHTML = `<div class="empty">No terms found for "<strong>${q}</strong>"</div>`; return; }
  cards.innerHTML = results.map(t => {
    const badges = isBio ? '' : `<div class="badges">${t.hl ? '<span class="badge badge-hl">HL</span>' : ''}${t.sl ? '<span class="badge badge-sl">SL</span>' : ''}</div>`;
    return `<div class="card"><div class="card-header"><div class="card-title">${t.title}</div>${badges}</div><div class="card-def">${t.def}</div></div>`;
  }).join('');
}

renderChips(econSuggestions, 'econChips', 'econSearch');
renderChips(bioSuggestions, 'bioChips', 'bioSearch');

document.getElementById('econSearch').addEventListener('input', e => doSearch('econSearch','econCards','econMeta',econTerms,false));
document.getElementById('bioSearch').addEventListener('input', e => doSearch('bioSearch','bioCards','bioMeta',bioTerms,true));

document.querySelectorAll('.tab:not(.soon)').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    const panel = document.getElementById('tab-' + tab.dataset.tab) || document.getElementById('tab-soon');
    panel.classList.add('active');
  });
});
</script>
